body:
  text: 三光注齡資福延壽妙經道言吾隱六合之内處明堂之中守鍊精魄自然衝衝明逹四遠萬境咸通開聞之始道之先宗吾陳此因説子之身子須祕受勿拖於人天有七機亦有三光斗應其機光應莫罡斗有七孔來應五臓安靜怡神名正修養耳則不可以亂聽眼則不可以視惡鼻則不可以聞臭口則不可以雜味虛中三光周流徧體頭以爲天足以爲地道法濟人自然之炁耳若亂聽聲色敗人眼若視惡眞光不明鼻若聞臭玉眞不清口若雜味身多病生是故病從口入福從色敗子若戒之命同天在能服金液飛仙必尅能服還丹堅骨延年子若有志但於名山無爲無欲安而復遷眞同凡俗貪欲爲冤大道玄聖在子目前斗覆子形光映子精宻而行之方得道成三光注齡資福延壽妙經
